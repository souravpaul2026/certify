<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CertifyPro — Resources</title>
  <link rel="stylesheet" href="/style.css" />
  <style>
    .resources-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
      margin-top: 24px;
    }
    .resource-card {
      background: #fff;
      border-radius: 14px;
      border: 1px solid var(--border);
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      transition: box-shadow 0.2s, transform 0.2s;
    }
    .resource-card:hover {
      box-shadow: 0 8px 24px rgba(0,0,0,0.10);
      transform: translateY(-2px);
    }
    .resource-icon {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }
    .resource-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
    }
    .resource-desc {
      font-size: 13px;
      color: var(--muted);
      flex: 1;
    }
    .resource-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-top: 4px;
    }
    .filter-bar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 20px;
    }
    .filter-btn {
      padding: 6px 16px;
      border-radius: 20px;
      border: 1.5px solid var(--border);
      background: #fff;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      color: var(--muted);
      transition: all 0.15s;
    }
    .filter-btn.active {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
    }
    .admin-add-bar {
      display: none;
      margin-top: 16px;
      padding: 12px 16px;
      background: #F5F3FF;
      border-radius: 10px;
      border: 1.5px dashed #C4B5FD;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .admin-add-bar.visible { display: flex; }
    .resource-thumb {
      width: 100%;
      height: 160px;
      border-radius: 10px;
      background: #0f0f0f;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }
    .resource-thumb:hover .play-btn { transform: scale(1.1); }
    .play-btn {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: rgba(255,255,255,0.92);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      transition: transform 0.15s;
      box-shadow: 0 4px 16px rgba(0,0,0,0.3);
    }
    .player-modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .player-modal-overlay.open { display: flex; }
    .player-modal {
      background: #000;
      border-radius: 14px;
      width: 100%;
      max-width: 900px;
      overflow: hidden;
      position: relative;
    }
    .player-modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: #1a1a1a;
    }
    .player-modal-title { color: #fff; font-size: 15px; font-weight: 600; }
    .player-close {
      background: none;
      border: none;
      color: #aaa;
      font-size: 24px;
      cursor: pointer;
      line-height: 1;
    }
    .player-close:hover { color: #fff; }
    .player-iframe-wrap {
      position: relative;
      width: 100%;
      padding-bottom: 56.25%;
    }
    .player-iframe-wrap iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>

<div id="mainApp">
  <nav class="topbar">
    <div class="topbar-brand">
      <div class="logo-icon">🎯</div>
      <div>
        CertifyPro
        <span class="brand-sub">GTM Enablement</span>
      </div>
    </div>
    <div class="topbar-nav">
      <a href="/">Admin</a>
      <a href="/review">Review</a>
      <a href="/resources" class="active">Resources</a>
    </div>
  </nav>

  <div class="container">
    <div class="page-header flex items-center justify-between">
      <div>
        <h1>Resources</h1>
        <p>Session decks, recordings, and learning materials</p>
      </div>
      <div style="display:flex;gap:10px;align-items:center;">
        <button class="btn btn-secondary btn-sm" onclick="toggleAdminMode()">Admin</button>
      </div>
    </div>

    <!-- Admin add bar (visible when admin is logged in) -->
    <div class="admin-add-bar" id="adminBar">
      <span style="font-size:13px;color:#6C2BD9;font-weight:500;">Admin mode active</span>
      <button class="btn btn-primary btn-sm" onclick="openModal('addResourceModal')">+ Add Resource</button>
    </div>

    <div class="filter-bar">
      <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
      <button class="filter-btn" onclick="setFilter('deck', this)">Decks</button>
      <button class="filter-btn" onclick="setFilter('recording', this)">Recordings</button>
      <button class="filter-btn" onclick="setFilter('other', this)">Other</button>
    </div>

    <div id="resourcesGrid" class="resources-grid">
      <div class="empty-state" style="grid-column:1/-1">
        <div class="empty-icon">📂</div>
        <h3>Loading resources...</h3>
      </div>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast-container" id="toastContainer"></div>

<!-- Add Resource Modal -->
<div class="modal-overlay" id="addResourceModal">
  <div class="modal">
    <div class="modal-header">
      <h3>Add Resource</h3>
      <button class="close-btn" onclick="closeModal('addResourceModal')">×</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>Title *</label>
        <input type="text" id="resTitle" class="form-control" placeholder="e.g. GTM Masterclass Deck" />
      </div>
      <div class="form-group">
        <label>Description</label>
        <input type="text" id="resDesc" class="form-control" placeholder="Brief description" />
      </div>
      <div class="form-group">
        <label>Type</label>
        <select id="resType" class="form-control">
          <option value="deck">Deck / Presentation</option>
          <option value="recording">Recording</option>
          <option value="other">Other</option>
        </select>
      </div>
      <div class="form-group">
        <label>Upload File <span style="color:var(--muted);font-weight:400">(PDF, PPT — max 20MB)</span></label>
        <input type="file" id="resFile" class="form-control" accept=".pdf,.ppt,.pptx,.doc,.docx" />
      </div>
      <div style="text-align:center;color:var(--muted);font-size:13px;margin:8px 0;">— or paste a link —</div>
      <div class="form-group">
        <label>URL <span style="color:var(--muted);font-weight:400">(Google Drive, YouTube, Loom…)</span></label>
        <input type="url" id="resUrl" class="form-control" placeholder="https://..." />
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('addResourceModal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveResource()">Add Resource</button>
    </div>
  </div>
</div>

<!-- Video Player Modal -->
<div class="player-modal-overlay" id="playerModal" onclick="closePlayer(event)">
  <div class="player-modal">
    <div class="player-modal-header">
      <span class="player-modal-title" id="playerTitle"></span>
      <button class="player-close" onclick="closePlayerModal()">×</button>
    </div>
    <div class="player-iframe-wrap">
      <iframe id="playerIframe" src="" allowfullscreen allow="autoplay"></iframe>
    </div>
  </div>
</div>

<!-- Admin Auth Modal -->
<div class="modal-overlay" id="adminAuthModal">
  <div class="modal" style="max-width:360px;">
    <div class="modal-header">
      <h3>Admin Login</h3>
      <button class="close-btn" onclick="closeModal('adminAuthModal')">×</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>Admin Password</label>
        <input type="password" id="adminPwdInput" class="form-control" placeholder="Enter password" />
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('adminAuthModal')">Cancel</button>
      <button class="btn btn-primary" onclick="doAdminLogin()">Login</button>
    </div>
  </div>
</div>

<script>
let adminPwd = localStorage.getItem('adminPwd') || '';
let allResources = [];
let currentFilter = 'all';
let isAdmin = false;

async function loadResources() {
  const res = await fetch('/api/resources');
  allResources = await res.json();
  renderResources();
}

function setFilter(type, btn) {
  currentFilter = type;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderResources();
}

function renderResources() {
  const grid = document.getElementById('resourcesGrid');
  const filtered = currentFilter === 'all' ? allResources : allResources.filter(r => r.type === currentFilter);

  if (filtered.length === 0) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">📂</div><h3>No resources yet</h3><p>Resources will appear here once added</p></div>`;
    return;
  }

  const iconMap = { deck: { icon: '📊', bg: '#EDE9FE' }, recording: { icon: '🎬', bg: '#DBEAFE' }, other: { icon: '📄', bg: '#F3F4F6' } };

  grid.innerHTML = filtered.map(r => {
    const { icon, bg } = iconMap[r.type] || iconMap.other;
    const link = r.url || `/api/resources/${r.id}/download`;
    const isExternal = !!r.url;
    const size = r.fileSize ? `${(r.fileSize / 1024 / 1024).toFixed(1)} MB` : '';
    const embedUrl = getEmbedUrl(r.url);
    const isEmbeddable = !!embedUrl && r.type === 'recording';

    return `
      <div class="resource-card">
        ${isEmbeddable ? `
          <div class="resource-thumb" onclick="openPlayer('${escHtml(r.title)}', '${embedUrl}')">
            <div class="play-btn">▶</div>
          </div>
        ` : `<div class="resource-icon" style="background:${bg}">${icon}</div>`}
        <div class="resource-title">${escHtml(r.title)}</div>
        ${r.description ? `<div class="resource-desc">${escHtml(r.description)}</div>` : ''}
        <div class="resource-footer">
          <span class="badge badge-gray">${r.type}</span>
          ${size ? `<span style="font-size:12px;color:var(--muted)">${size}</span>` : ''}
          ${isEmbeddable
            ? `<button class="btn btn-primary btn-sm" style="margin-left:auto;" onclick="openPlayer('${escHtml(r.title)}', '${embedUrl}')">Watch</button>`
            : `<a href="${link}" target="${isExternal ? '_blank' : '_self'}" class="btn btn-primary btn-sm" style="margin-left:auto;">${isExternal ? 'Open' : 'Download'}</a>`
          }
          ${isAdmin ? `<button class="btn btn-danger btn-sm" onclick="deleteResource('${r.id}')">Delete</button>` : ''}
        </div>
      </div>
    `;
  }).join('');
}

function toggleAdminMode() {
  if (isAdmin) {
    isAdmin = false;
    document.getElementById('adminBar').classList.remove('visible');
    renderResources();
    return;
  }
  if (adminPwd) {
    activateAdmin();
  } else {
    document.getElementById('adminPwdInput').value = '';
    openModal('adminAuthModal');
  }
}

async function doAdminLogin() {
  const pwd = document.getElementById('adminPwdInput').value;
  const res = await fetch('/api/resources', { headers: { 'x-admin-password': pwd } });
  if (!res.ok) { showToast('Wrong password', 'error'); return; }
  adminPwd = pwd;
  localStorage.setItem('adminPwd', pwd);
  closeModal('adminAuthModal');
  activateAdmin();
}

function activateAdmin() {
  isAdmin = true;
  document.getElementById('adminBar').classList.add('visible');
  renderResources();
}

async function saveResource() {
  const title = document.getElementById('resTitle').value.trim();
  const description = document.getElementById('resDesc').value.trim();
  const type = document.getElementById('resType').value;
  const file = document.getElementById('resFile').files[0];
  const url = document.getElementById('resUrl').value.trim();

  if (!title) { showToast('Title is required', 'error'); return; }
  if (!file && !url) { showToast('Upload a file or paste a URL', 'error'); return; }

  const formData = new FormData();
  formData.append('title', title);
  formData.append('description', description);
  formData.append('type', type);
  if (file) formData.append('file', file);
  if (url) formData.append('url', url);

  const res = await fetch('/api/resources', {
    method: 'POST',
    headers: { 'x-admin-password': adminPwd },
    body: formData,
  });

  if (!res.ok) { showToast('Failed to add resource', 'error'); return; }
  const resource = await res.json();
  allResources.unshift(resource);
  renderResources();
  closeModal('addResourceModal');
  document.getElementById('resTitle').value = '';
  document.getElementById('resDesc').value = '';
  document.getElementById('resFile').value = '';
  document.getElementById('resUrl').value = '';
  showToast('Resource added!', 'success');
}

async function deleteResource(id) {
  if (!confirm('Delete this resource?')) return;
  await fetch(`/api/resources/${id}`, { method: 'DELETE', headers: { 'x-admin-password': adminPwd } });
  allResources = allResources.filter(r => r.id !== id);
  renderResources();
  showToast('Resource deleted');
}

// ===== UTILS =====
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

document.querySelectorAll('.modal-overlay').forEach(m => {
  m.addEventListener('click', e => { if (e.target === m) m.classList.remove('open'); });
});

function showToast(msg, type = 'info') {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  const icon = type === 'success' ? '✅' : type === 'error' ? '❌' : 'ℹ️';
  toast.innerHTML = `<span>${icon}</span><span>${msg}</span>`;
  container.appendChild(toast);
  setTimeout(() => toast.remove(), 3500);
}

function escHtml(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function getEmbedUrl(url) {
  if (!url) return null;
  // Google Drive: https://drive.google.com/file/d/FILE_ID/view or /open?id=FILE_ID
  const driveMatch = url.match(/drive\.google\.com\/file\/d\/([^/\?]+)/) ||
                     url.match(/drive\.google\.com\/open\?id=([^&]+)/);
  if (driveMatch) return `https://drive.google.com/file/d/${driveMatch[1]}/preview`;

  // YouTube: watch?v=ID or youtu.be/ID
  const ytMatch = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([^&\?]+)/);
  if (ytMatch) return `https://www.youtube.com/embed/${ytMatch[1]}`;

  return null;
}

function openPlayer(title, embedUrl) {
  document.getElementById('playerTitle').textContent = title;
  document.getElementById('playerIframe').src = embedUrl;
  document.getElementById('playerModal').classList.add('open');
}

function closePlayerModal() {
  document.getElementById('playerModal').classList.remove('open');
  document.getElementById('playerIframe').src = '';
}

function closePlayer(e) {
  if (e.target === document.getElementById('playerModal')) closePlayerModal();
}

loadResources();
</script>
</body>
</html>
